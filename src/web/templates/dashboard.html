<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧘 FocusGuardian Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row mb-3">
            <div class="col-12">
                <div class="glass-card p-3">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                        <div>
                            <h2 class="mb-0"><span style="color: var(--color-good);">🧘</span> FocusGuardian</h2>
                            <small class="text-muted" id="status-text" data-i18n="initializing">Инициализация...</small>
                        </div>
                        <div class="d-flex flex-wrap gap-2 align-items-center">
                            <span class="lang-switch me-2" onclick="toggleLanguage()" id="lang-btn">RU</span>
                            <span class="badge-fps" id="fps-badge">📹 0 FPS</span>
                            <span class="badge bg-secondary" id="uptime-badge">⏱️ 0м</span>
                            <button class="btn btn-sm btn-glass btn-glass-warning" onclick="togglePause()" id="pause-btn">
                                <i class="fas fa-pause"></i> <span data-i18n="btn_pause">Пауза</span>
                            </button>
                            <button class="btn btn-sm btn-glass btn-glass-info" onclick="generateReport()">
                                <i class="fas fa-file-alt"></i> <span data-i18n="btn_report">Отчет</span>
                            </button>
                            <button class="btn btn-sm btn-glass btn-glass-success" onclick="exportData()">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 col-md-12 mb-3">
                <div class="glass-card p-0 position-relative overflow-hidden">
                    <img id="video-feed" src="/api/stream" alt="Video Feed">
                    
                    <div class="position-absolute top-0 end-0 p-3">
                        <span class="status-dot status-offline" id="status-dot"></span>
                    </div>
                    
                    <div id="voice-overlay" class="position-absolute bottom-0 start-0 w-100 p-3" style="display: none;">
                        <div class="text-center text-white" id="voice-text">
                            <i class="fas fa-microphone fa-pulse me-2"></i>
                            <span data-i18n="listening">Слушаю...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-12">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <div class="stat-card">
                            <div class="stat-value" id="posture-status">✅</div>
                            <div class="stat-label" data-i18n="label_posture">Осанка</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card">
                            <div class="stat-value" id="blink-count" style="color: var(--color-info);">0</div>
                            <div class="stat-label" data-i18n="label_blinks">Моргания</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card">
                            <div class="stat-value" id="slouch-count" style="color: var(--color-warning);">0</div>
                            <div class="stat-label" data-i18n="label_slouches">Наклоны</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card">
                            <div class="stat-value" id="critical-count" style="color: var(--color-critical);">0</div>
                            <div class="stat-label" data-i18n="label_critical">Критические</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-2 mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2 px-1">
                        <small class="text-muted">
                            <i class="fas fa-chart-line me-1"></i>
                            <span data-i18n="chart_title">История осанки</span>
                        </small>
                        <small class="text-muted" id="chart-time" data-i18n="chart_limit">Последние 50</small>
                    </div>
                    <div style="height: 120px; position: relative;">
                        <canvas id="posture-chart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <small>
                            <i class="fas fa-microphone me-1"></i>
                            <span data-i18n="voice_commands">Голосовые команды</span>
                        </small>
                        <span class="badge bg-secondary" id="voice-status">Offline</span>
                    </div>
                    <div class="row g-1">
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass w-100" onclick="sendCommand('status')">
                                <i class="fas fa-info-circle"></i> <span data-i18n="cmd_status">Статус</span>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass btn-glass-warning w-100" onclick="sendCommand('pause')">
                                <i class="fas fa-pause"></i> <span data-i18n="cmd_pause">Пауза</span>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass btn-glass-success w-100" onclick="sendCommand('resume')">
                                <i class="fas fa-play"></i> <span data-i18n="cmd_resume">Старт</span>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass btn-glass-info w-100" onclick="sendCommand('report')">
                                <i class="fas fa-file-alt"></i> <span data-i18n="cmd_report">Отчет</span>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass btn-glass-danger w-100" onclick="sendCommand('reset')">
                                <i class="fas fa-redo"></i> <span data-i18n="cmd_reset">Сброс</span>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-sm btn-glass w-100" onclick="sendCommand('help')">
                                <i class="fas fa-question-circle"></i> <span data-i18n="cmd_help">Инфо</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12">
                <div class="text-center text-muted small">
                    <i class="fas fa-shield-alt me-1"></i>
                    <span data-i18n="privacy_note">Все вычисления производятся локально. Данные не передаются в облако.</span>
                    <span class="mx-2">|</span>
                    <span id="session-info">Сессия: загрузка...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
